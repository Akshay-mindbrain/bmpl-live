server {
    listen 80;
    server_name mindvex.cloud admin.mindvex.cloud api-user.mindvex.cloud api-admin.mindvex.cloud;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mindvex.cloud;

    ssl_certificate /etc/letsencrypt/live/mindvex.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mindvex.cloud/privkey.pem;

    location / {
        proxy_pass http://user-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name admin.mindvex.cloud;

    ssl_certificate /etc/letsencrypt/live/mindvex.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mindvex.cloud/privkey.pem;

    location / {
        proxy_pass http://admin-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


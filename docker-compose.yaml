services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_NAME:-mybmpl_user}
      MYSQL_USER: ${DB_USER:-bmpl}
      MYSQL_PASSWORD: ${DB_USER_PASSWORD:-bmpl}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - bmpl-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-secret}

  admin-api:
    image: node:22-bookworm
    working_dir: /workspace/admin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      ADMIN_PORT: 3000
      DATABASE_URL: mysql://root:${DB_PASSWORD:-secret}@db:3306/${DB_NAME:-mybmpl_user}
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
      - admin-node-modules:/workspace/admin/node_modules
    command: sh -c "npm install; npx prisma generate --schema prisma/schema.prisma; npx prisma migrate deploy --schema prisma/schema.prisma; npm run build && npm run start"

  user-api:
    image: node:22-bookworm
    working_dir: /workspace/user
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      USER_PORT: 3001
      DATABASE_URL: mysql://root:${DB_PASSWORD:-secret}@db:3306/${DB_NAME:-mybmpl_user}
    ports:
      - "3001:3001"
    volumes:
      - ./:/workspace
      - user-node-modules:/workspace/user/node_modules
    command: sh -c "npm install; npx prisma generate --schema prisma/schema.prisma; npx prisma migrate deploy --schema prisma/schema.prisma; npm run build && npm run start"

  user-frontend:
    image: node:22-alpine
    working_dir: /workspace/user-frontend
    restart: unless-stopped
    depends_on:
      - user-api
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_PROXY_TARGET: http://user-api:3001
    ports:
      - "5173:5173"
    volumes:
      - ./:/workspace
      - user-frontend-node-modules:/workspace/user-frontend/node_modules
    command: sh -c "[ -x node_modules/.bin/vite ] || npm install; npm run dev -- --host 0.0.0.0 --port 5173"

  admin-frontend:
    image: node:22-alpine
    working_dir: /workspace/admin-frontend
    restart: unless-stopped
    depends_on:
      - admin-api
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5174:5174"
    volumes:
      - ./:/workspace
      - admin-frontend-node-modules:/workspace/admin-frontend/node_modules
    command: sh -c "[ -x node_modules/.bin/vite ] || npm install; npm run dev -- --host 0.0.0.0 --port 5174"

volumes:
  bmpl-db-data:
  admin-node-modules:
  user-node-modules:
  user-frontend-node-modules:
  admin-frontend-node-modules:
